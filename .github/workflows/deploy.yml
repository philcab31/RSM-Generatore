name: Deploy Next.js Standalone to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone app
        run: |
          npm run build
          # Run patch script to log env variables and patch port binding in server.js
          node scripts/patch-server.js


      - name: Prepare standalone folder
        run: |
          mkdir -p .next/standalone/public
          mkdir -p .next/standalone/.next/static
          mkdir -p .next/standalone/tmp
          
          # Copy public and static files
          if [ -d "public" ]; then cp -R public/. .next/standalone/public/; fi
          if [ -d ".next/static" ]; then cp -R .next/static/. .next/standalone/.next/static/; fi
          
          # Create restart file for Phusion Passenger
          touch .next/standalone/tmp/restart.txt

      - name: Install sshpass and rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Clean up public_html folder
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          SSH_HOST=$(echo "${{ secrets.HOSTINGER_SSH_HOST }}" | tr -d '\r\n ')
          SSH_PORT=$(echo "${{ secrets.HOSTINGER_SSH_PORT }}" | tr -d '\r\n ')
          SSH_USER=$(echo "${{ secrets.HOSTINGER_SSH_USER }}" | tr -d '\r\n ')
          PUBLIC_HTML_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ')
          NODEJS_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ' | sed 's/public_html/nodejs/')
          
          # === STEP 1: Kill any old Node.js process BEFORE touching the files ===
          # This ensures Passenger does not serve stale HTML (old hashes) while rsync
          # is writing new files (new hashes) which would cause 404 on static chunks.
          echo "Stopping active Node.js processes before deploy..."
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "pkill -u $SSH_USER node 2>/dev/null || killall -9 node 2>/dev/null || true"
          echo "Waiting 3s for processes to stop..."
          sleep 3
          
          # === STEP 2: Ensure preload-timestamp.js stub files exist ===
          # Hostinger injects NODE_OPTIONS=--require .../preload-timestamp.js via .htaccess.
          # If the file doesn't exist, Node.js crashes with MODULE_NOT_FOUND before starting.
          PARENT_DIR=$(dirname "$PUBLIC_HTML_DIR")
          echo "Creating dummy preload-timestamp.js files in parent and public_html..."
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "mkdir -p $PARENT_DIR/.builds/config $PUBLIC_HTML_DIR/.builds/config && echo '// dummy' > $PARENT_DIR/.builds/config/preload-timestamp.js && echo '// dummy' > $PUBLIC_HTML_DIR/.builds/config/preload-timestamp.js"
          
          # === STEP 3: Check env file on server ===
          echo "=== REMOTE .env.local ON SERVER ==="
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "cat $NODEJS_DIR/.env.local 2>/dev/null || echo 'No .env.local found on server!'"
          
          # === STEP 4: Clean up stale Node artifacts from public_html ===
          # NOTE: We do NOT remove public_html/.next here anymore!
          # public_html/_next/static/ is intentionally populated by the rsync step
          # so that LiteSpeed can serve /_next/static/ files directly (bypassing Passenger).
          echo "Cleaning up Node.js leftover files from public_html (keeping _next/static for LiteSpeed)..."
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "rm -rf $PUBLIC_HTML_DIR/node_modules $PUBLIC_HTML_DIR/server.js $PUBLIC_HTML_DIR/package.json $PUBLIC_HTML_DIR/public $PUBLIC_HTML_DIR/restart.bat $PUBLIC_HTML_DIR/tmp"

      - name: Deploy brand and prompts config (if not existing)
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          # Sanitize environment variables to remove any trailing newlines or spaces
          SSH_HOST=$(echo "${{ secrets.HOSTINGER_SSH_HOST }}" | tr -d '\r\n ')
          SSH_PORT=$(echo "${{ secrets.HOSTINGER_SSH_PORT }}" | tr -d '\r\n ')
          SSH_USER=$(echo "${{ secrets.HOSTINGER_SSH_USER }}" | tr -d '\r\n ')
          TARGET_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ' | sed 's/public_html/nodejs/')
          
          # Sync config files only if they do not exist on the server
          sshpass -e rsync -avz --ignore-existing \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            brand-identity.json prompts-custom.json \
            $SSH_USER@$SSH_HOST:$TARGET_DIR/

      - name: Deploy application files via Rsync
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          # Sanitize environment variables to remove any trailing newlines or spaces
          SSH_HOST=$(echo "${{ secrets.HOSTINGER_SSH_HOST }}" | tr -d '\r\n ')
          SSH_PORT=$(echo "${{ secrets.HOSTINGER_SSH_PORT }}" | tr -d '\r\n ')
          SSH_USER=$(echo "${{ secrets.HOSTINGER_SSH_USER }}" | tr -d '\r\n ')
          TARGET_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ' | sed 's/public_html/nodejs/')
          PUBLIC_HTML_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ')
          
          # === PART 1: Deploy the full Next.js standalone server to nodejs/ ===
          # This is the Node.js application (server.js, node_modules, .next/server)
          # We exclude brand-identity.json and prompts-custom.json to prevent overwriting server-side updates
          # We exclude .env* to avoid overwriting any custom environment files on the server
          # We exclude .htaccess to avoid deleting the web server routing configuration
          echo "Deploying Next.js standalone server to nodejs/..."
          sshpass -e rsync -avz --delete \
            --exclude ".htaccess" \
            --exclude "brand-identity.json" \
            --exclude "prompts-custom.json" \
            --exclude ".env*" \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            .next/standalone/ \
            $SSH_USER@$SSH_HOST:$TARGET_DIR/
          
          # === PART 2: Deploy static assets to public_html/_next/static/ ===
          # LiteSpeed serves static files DIRECTLY from public_html/, bypassing Node.js/Passenger.
          # Without this, ALL /_next/static/ requests return 404 because LiteSpeed can't find them.
          # The static files in nodejs/.next/static/ are only readable by Node.js, not LiteSpeed.
          echo "Deploying Next.js static assets to public_html/_next/static/ for direct LiteSpeed serving..."
          sshpass -e rsync -avz --delete \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            .next/static/ \
            $SSH_USER@$SSH_HOST:$PUBLIC_HTML_DIR/_next/static/

      - name: Restart Passenger Node.js application
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          # Sanitize environment variables to remove any trailing newlines or spaces
          SSH_HOST=$(echo "${{ secrets.HOSTINGER_SSH_HOST }}" | tr -d '\r\n ')
          SSH_PORT=$(echo "${{ secrets.HOSTINGER_SSH_PORT }}" | tr -d '\r\n ')
          SSH_USER=$(echo "${{ secrets.HOSTINGER_SSH_USER }}" | tr -d '\r\n ')
          TARGET_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ' | sed 's/public_html/nodejs/')
          
          echo "Touching restart.txt to trigger Passenger reload after new files are in place..."
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "mkdir -p $TARGET_DIR/tmp && touch $TARGET_DIR/tmp/restart.txt"


      - name: Inspect remote files
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          SSH_HOST=$(echo "${{ secrets.HOSTINGER_SSH_HOST }}" | tr -d '\r\n ')
          SSH_PORT=$(echo "${{ secrets.HOSTINGER_SSH_PORT }}" | tr -d '\r\n ')
          SSH_USER=$(echo "${{ secrets.HOSTINGER_SSH_USER }}" | tr -d '\r\n ')
          PUBLIC_HTML_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ')
          NODEJS_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ' | sed 's/public_html/nodejs/')
          PARENT_DIR=$(dirname "$PUBLIC_HTML_DIR")
          
          echo "=== REMOTE PARENT DIRECTORY LISTING ==="
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "ls -la $PARENT_DIR"
          echo "=== REMOTE public_html DIRECTORY LISTING ==="
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "ls -la $PUBLIC_HTML_DIR"
          echo "=== REMOTE nodejs DIRECTORY LISTING ==="
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "ls -la $NODEJS_DIR"
          echo "=== REMOTE .htaccess CONTENT ==="
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "cat $PUBLIC_HTML_DIR/.htaccess || true"
          # Update .htaccess on the server to use an absolute path for console.log dynamically
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "sed -i \"s|SetEnv LSNODE_CONSOLE_LOG console.log|SetEnv LSNODE_CONSOLE_LOG $NODEJS_DIR/console.log|\" $PUBLIC_HTML_DIR/.htaccess || true"
          
          # Inject LiteSpeed cache-disable directive so LiteSpeed NEVER caches the Node.js HTML responses.
          # Without this, LiteSpeed serves stale HTML (with old JS/CSS hashes) after a deployment,
          # causing 404 errors for all static chunk files that have been replaced by rsync.
          echo "Patching .htaccess to disable LiteSpeed cache for dynamic pages..."
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "
            if ! grep -q 'CacheDisable public' $PUBLIC_HTML_DIR/.htaccess 2>/dev/null; then
              echo '' >> $PUBLIC_HTML_DIR/.htaccess
              echo '# Disable LiteSpeed Cache for all Node.js app responses' >> $PUBLIC_HTML_DIR/.htaccess
              echo '<IfModule LiteSpeed>' >> $PUBLIC_HTML_DIR/.htaccess
              echo 'CacheDisable public /' >> $PUBLIC_HTML_DIR/.htaccess
              echo '</IfModule>' >> $PUBLIC_HTML_DIR/.htaccess
              echo 'Cache-control directive added to .htaccess'
            else
              echo 'Cache-disable already present in .htaccess, skipping'
            fi
          "
          echo "=== UPDATED REMOTE .htaccess CONTENT ==="
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "cat $PUBLIC_HTML_DIR/.htaccess || true"

      - name: Run test start of server
        env:
          SSHPASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          SSH_HOST=$(echo "${{ secrets.HOSTINGER_SSH_HOST }}" | tr -d '\r\n ')
          SSH_PORT=$(echo "${{ secrets.HOSTINGER_SSH_PORT }}" | tr -d '\r\n ')
          SSH_USER=$(echo "${{ secrets.HOSTINGER_SSH_USER }}" | tr -d '\r\n ')
          NODEJS_DIR=$(echo "${{ secrets.HOSTINGER_SERVER_DIR }}" | tr -d '\r\n ' | sed 's/public_html/nodejs/')
          
          echo "Uploading diagnostic script to remote server..."
          sshpass -e scp -P $SSH_PORT -o StrictHostKeyChecking=no scripts/diag.sh $SSH_USER@$SSH_HOST:$NODEJS_DIR/diag.sh
          
          echo "Running remote server diagnostics..."
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "tr -d '\r' < $NODEJS_DIR/diag.sh > $NODEJS_DIR/diag_lf.sh && bash $NODEJS_DIR/diag_lf.sh $NODEJS_DIR && rm -f $NODEJS_DIR/diag.sh $NODEJS_DIR/diag_lf.sh"
          
          echo "=== REMOTE ACTIVE ENVIRONMENT LOG (If created by Passenger/LiteSpeed) ==="
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "cat $NODEJS_DIR/debug_env.log || echo 'No active debug_env.log yet (process has not booted via Passenger)'"
          
          echo "=== REMOTE ACTIVE CONSOLE LOG (If created by Passenger/LiteSpeed) ==="
          sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "cat $NODEJS_DIR/console.log || echo 'No active console.log yet (process has not booted via Passenger)'"







